name: Pipelock Agent Security Scan

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]
  workflow_dispatch:

permissions:
  contents: read

jobs:
  pipelock:
    name: Agent egress / secret scan
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@11bd71901bbe5b1630ceea73d27597364c9af683 # v4.2.2
        with:
          fetch-depth: 0
      - name: Run Pipelock scan
        uses: luckyPipewrench/pipelock@a5957685f67a664e8d32c1bb9793e46d1f74946a # v2.6.0
        with:
          scan-diff: true
          fail-on-findings: true
