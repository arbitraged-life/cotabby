name: AI Conflict Resolve

# Thin caller. Logic lives in NERV-es/.github (SHA-pinned).
# Fires when the daily upstream-sync workflow labels a tracking issue
# `upstream-sync`, or on manual dispatch. Produces a DRAFT PR — never merges.

on:
  issues:
    types: [labeled]
  workflow_dispatch:

permissions:
  contents: write
  pull-requests: write
  issues: write
  models: read

jobs:
  resolve:
    if: ${{ github.event_name == 'workflow_dispatch' || github.event.label.name == 'upstream-sync' }}
    uses: NERV-es/.github/.github/workflows/ai-conflict-resolve-reusable.yml@18fb411ec1a5fff12541d0279e627a83c26eefe8
    secrets: inherit
